<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlantGuard - Login</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .auth {
      min-height: calc(100vh - 80px);
      display: grid;
      place-items: center;
      padding: 32px 0;
    }

    .auth-card {
      width: min(440px, 100%);
      padding: 30px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 44px;
      margin: 12px 0 10px;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid rgba(127, 151, 118, 0.28);
      background: #0f160e;
      color: var(--text);
      border-radius: 8px;
      padding: 13px 14px;
    }

    .switch {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .switch a {
      color: var(--green);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a class="app-logo" href="/login">Plant<span>Guard</span></a>
    <nav class="app-nav">
      <a class="active" href="/login">Login</a>
      <a href="/register">Register</a>
    </nav>
  </header>

  <main class="page auth">
    <section class="panel auth-card">
      <div class="eyebrow">Welcome Back</div>
      <h1>Login</h1>
      <p class="muted">Sign in to save your scan history.</p>
      <form id="loginForm">
        <label>Email
          <input id="email" type="email" required autocomplete="email">
        </label>
        <label>Password
          <input id="password" type="password" required autocomplete="current-password">
        </label>
        <button class="btn" type="submit">Login</button>
        <div id="status" class="alert ok" style="display:none;"></div>
      </form>
      <p class="switch">New here? <a href="/register">Create an account</a></p>
      <p class="switch"><a href="/upload">Continue without login</a></p>
    </section>
  </main>

  <script>
    const API = "http://localhost:5000";
    const form = document.getElementById("loginForm");
    const statusBox = document.getElementById("status");

    function setStatus(message, type) {
      statusBox.style.display = "block";
      statusBox.className = "alert " + type;
      statusBox.textContent = message;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("Signing in...", "warn");
      try {
        const response = await fetch(API + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
          })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Login failed.");
        localStorage.setItem("leafscanUser", JSON.stringify(data.user));
        window.location.href = "/upload";
      } catch (error) {
        setStatus(error.message, "error");
      }
    });
  </script>
</body>
</html>
